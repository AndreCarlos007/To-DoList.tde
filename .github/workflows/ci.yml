name: CI — Todo List DevOps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-api:
    name: Testes da API (Jest + Supertest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./api
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar dependências da API
        run: npm install

      - name: Executar testes com cobertura
        run: npm run test:coverage

      - name: Publicar relatório de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage-report
          path: api/coverage/
          retention-days: 7

  build-api:
    name: Build da API (TypeScript)
    runs-on: ubuntu-latest
    needs: test-api
    defaults:
      run:
        working-directory: ./api
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar dependências da API
        run: npm install

      - name: Compilar TypeScript
        run: npm run build

      - name: Verificar artefatos gerados
        run: ls -la dist/

  build-frontend:
    name: Build do Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Instalar dependências do frontend
        run: pnpm install

      - name: Build do Next.js
        run: pnpm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

  docker-compose-build:
    name: Build Docker Compose (3 containers)
    runs-on: ubuntu-latest
    needs: [build-api, build-frontend]
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Verificar versão do Docker e Docker Compose
        run: |
          docker --version
          docker compose version

      - name: Fazer build de todas as imagens
        run: docker compose build --no-cache

      - name: Subir os containers em background
        run: docker compose up -d

      - name: Aguardar containers ficarem saudáveis
        run: |
          echo "Aguardando 30 segundos para os containers iniciarem..."
          sleep 30

      - name: Verificar status dos containers
        run: docker compose ps

      - name: Testar health check da API
        run: |
          curl --fail --retry 5 --retry-delay 3 http://localhost:3001/health || \
          (docker compose logs api && exit 1)

      - name: Testar endpoint de listagem de todos
        run: curl --fail http://localhost:3001/todos

      - name: Parar e remover containers
        if: always()
        run: docker compose down -v